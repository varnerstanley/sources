<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="280" height="44" viewBox="0 0 280 44" role="img" aria-label="Family Value Creation">
  <title>Family Value Creation</title>
  <defs>
    <linearGradient id="fv-tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#456EFE"/>
      <stop offset="100%" stop-color="#7B9FFF"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@800;900&amp;display=swap');
      .wm {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 19px;
        font-weight: 800;
        letter-spacing: -0.4px;
      }
      .fv {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: -0.8px;
      }
    </style>
  </defs>

  <!-- FV tile -->
  <rect width="44" height="44" rx="11" fill="url(#fv-tile)"/>
  <text class="fv" x="22" y="29.5" fill="white" text-anchor="middle">FV</text>

  <!-- Wordmark: "Family Value Creation" -->
  <!-- Dark text on transparent / light background -->
  <text class="wm" x="56" y="29.5">
    <tspan fill="#23303B">Family </tspan><tspan fill="#456EFE">Value</tspan><tspan fill="#23303B"> Creation</tspan>
  </text>
</svg>
