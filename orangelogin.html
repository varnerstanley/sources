<!DOCTYPE html>
<html lang="{{locale}}">
<head>
  {%- auth0:head -%}
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
   :root {
     --widget-background-color: #f9f7f2;
     --shadow-component-outer: 0 0 #0000, 
       0 0 #0000, 
       0 4px 24px 0 hsl(0 0% 0% / 1.57%),
       0 4px 32px 0 hsl(0 0% 0% / 1.57%),
       0 2px 64px 0 hsl(0 0% 0% / 1.18%),
       0 16px 32px 0 hsl(0 0% 0% / 1.18%);
       --border-default-color: #1f1e1d26;
       --logo-height: 52px;
       --input-background-color: #f9f7f2;
       --border-radius-outer: 2rem;
            }
          
            #custom-prompt-logo {
                background-image: url('https://mfc.fit/auth0svg.svg');
            }
            h1 {
              display: none;
            }
            header div p {
              display: none !important;
            }
         body {
            background-color: #f9f7f2 !important;
            font-family: 'Inter', sans-serif;
            color: #1d1c16;
            }
            .serif-heading {
                font-family: 'Source Serif 4', serif;
            }
            
            .auth0-lock.auth0-lock {
                box-shadow: 0 4px 24px rgba(0,0,0,0.04) !important;
                border: 0.5px solid #faf9f5 !important;
                border-radius: 2rem !important;
            }
            .ulp-title {
                display: none !important; 
            }
    body {
      background-color: #f9f7f2 !important;
      font-family: 'Inter', sans-serif;
      color: #1d1c16;
    }
    .serif-heading {
      font-family: 'Source Serif 4', serif;
    }
    /* Auth0 Widget Specific Overrides */
    .auth0-lock.auth0-lock {
      box-shadow: 0 4px 24px rgba(0,0,0,0.04) !important;
      border: 0.5px solid #e5e2da !important;
      border-radius: 2rem !important;
    }
    .ulp-title {
      display: none !important; /* Claude uses the H2 in the layout instead */
    }
  </style>
</head>
